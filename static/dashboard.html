<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glonetech - Executive Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* CONFIGURATION - CUSTOMIZE YOUR LOGO HERE */
        :root {
            --logo-url: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text x="50" y="70" font-size="80" font-weight="bold" text-anchor="middle" fill="%23ffffff">G</text></svg>');
            /* To use your own logo image, replace the above with:
               --logo-url: url('/path/to/your/logo.png');
               Make sure to adjust logo width/height as needed */
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f5f5 0%, #ffffff 100%);
            color: #000000;
            overflow-x: hidden;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-40px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideInSidebar {
            from { opacity: 0; transform: translateX(-100%); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes fadeInDim {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(40px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideOutRight {
            from { opacity: 1; transform: translateX(0); }
            to { opacity: 0; transform: translateX(40px); }
        }

        /* SIDEBAR */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 99;
            animation: fadeInDim 0.3s ease;
        }

        .sidebar-overlay.show {
            display: block;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            background: linear-gradient(180deg, #ffffff 0%, #f8f8f8 100%);
            border-right: 1px solid rgba(0, 0, 0, 0.08);
            z-index: 100;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            overflow-y: auto;
        }

        .sidebar.show {
            transform: translateX(0);
        }

        .sidebar-header {
            padding: 25px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-logo-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .sidebar-logo {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #000000 0%, #333333 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 900;
            font-size: 20px;
            background-image: var(--logo-url);
            background-size: cover;
            background-position: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .sidebar-title {
            font-family: 'Playfair Display', serif;
            font-size: 16px;
            font-weight: 700;
        }

        .sidebar-close {
            width: 35px;
            height: 35px;
            background: rgba(0, 0, 0, 0.05);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sidebar-close:hover {
            background: rgba(0, 0, 0, 0.1);
        }

        .sidebar-menu {
            padding: 25px 10px;
        }

        .sidebar-item {
            width: 100%;
            padding: 14px 15px;
            background: transparent;
            border: none;
            color: #666666;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            text-align: left;
            transition: all 0.3s ease;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
            font-family: 'Inter', sans-serif;
        }

        .sidebar-item:hover {
            background: rgba(0, 0, 0, 0.08);
            color: #000000;
        }

        .sidebar-item.active {
            background: linear-gradient(135deg, #000000 0%, #333333 100%);
            color: white;
        }

        .sidebar-item i {
            width: 18px;
            text-align: center;
        }

        /* LAYOUT */
        .dashboard-layout {
            display: grid;
            grid-template-columns: 1fr;
            min-height: 100vh;
        }

        /* HEADER */
        .header {
            background: linear-gradient(135deg, #ffffff 0%, #f8f8f8 100%);
            padding: 25px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            animation: fadeUp 0.8s ease;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .hamburger-btn {
            width: 45px;
            height: 45px;
            background: rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .hamburger-btn:hover {
            background: rgba(0, 0, 0, 0.1);
        }

        .logo {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #000000 0%, #333333 100%);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 900;
            font-size: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            background-image: var(--logo-url);
            background-size: cover;
            background-position: center;
        }

        .greeting {
            font-family: 'Playfair Display', serif;
        }

        .greeting-time {
            font-size: 12px;
            color: #888888;
            font-family: 'Space Grotesk', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .greeting-text {
            font-size: 24px;
            font-weight: 900;
            margin-top: 3px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-btn {
            width: 45px;
            height: 45px;
            background: rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000000;
            font-size: 18px;
        }

        .header-btn:hover {
            background: rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }

        /* PAGE CONTENT */
        .page-content {
            padding: 40px;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
        }

        /* SECTION */
        .section {
            margin-bottom: 50px;
            animation: fadeUp 0.8s ease;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(0, 0, 0, 0.08);
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 900;
        }

        .section-view-more {
            font-size: 13px;
            color: #000000;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-view-more:hover {
            gap: 12px;
        }

        /* CARDS HORIZONTAL */
        .cards-horizontal {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 25px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .card {
            background: linear-gradient(135deg, #ffffff 0%, #f8f8f8 100%);
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 25px;
            padding: 30px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            animation: scaleIn 0.6s ease;
            flex-shrink: 0;
            min-width: 400px;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            border-color: rgba(0, 0, 0, 0.2);
            transform: translateY(-8px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
        }

        /* TASK CARD */
        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .task-priority {
            font-size: 11px;
            font-weight: 700;
            padding: 6px 12px;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .priority-high {
            background: rgba(255, 59, 48, 0.2);
            color: #ff3b30;
        }

        .priority-medium {
            background: rgba(255, 149, 0, 0.2);
            color: #ff9500;
        }

        .priority-low {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
        }

        .task-status {
            font-size: 11px;
            padding: 6px 12px;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-pending {
            background: rgba(255, 149, 0, 0.2);
            color: #ff9500;
        }

        .status-completed {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
        }

        .status-in-progress {
            background: rgba(33, 150, 243, 0.2);
            color: #2196f3;
        }

        .task-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .task-meta {
            font-size: 12px;
            color: #888888;
            margin-bottom: 8px;
        }

        .task-deadline {
            font-size: 12px;
            color: #888888;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 15px;
        }

        .task-more-btn {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.1);
            color: #000000;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 8px;
        }

        .task-more-btn:hover {
            background: rgba(0, 0, 0, 0.1);
        }

        .task-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: auto;
        }

        .task-actions .task-more-btn {
            margin-top: 0;
        }

        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
        }

        .empty-state-icon {
            font-size: 48px;
            color: #ccc;
            margin-bottom: 20px;
        }

        .empty-state-title {
            font-size: 18px;
            color: #666;
            margin-bottom: 10px;
        }

        .empty-state-text {
            color: #999;
        }

        /* CONTENT MORE BTN */
        .content-more-btn {
            width: 100%;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.1);
            color: #000000;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 11px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 10px;
        }

        .content-more-btn:hover {
            background: rgba(0, 0, 0, 0.1);
        }

        /* EVENT CARD */
        .event-date {
            font-size: 12px;
            color: #888888;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .event-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .event-time {
            font-size: 12px;
            color: #888888;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .event-more-btn {
            width: 100%;
            padding: 10px;
            background: rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.1);
            color: #000000;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .event-more-btn:hover {
            background: rgba(0, 0, 0, 0.1);
        }

        /* PLATFORM CARD */
        .platform-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        }

        .platform-icon {
            width: 45px;
            height: 45px;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .platform-name {
            font-weight: 700;
            font-size: 14px;
        }

        .content-item {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .content-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .content-date {
            font-size: 11px;
            color: #888888;
            margin-bottom: 5px;
        }

        .content-title {
            font-size: 13px;
            font-weight: 600;
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 30px;
            color: #888888;
            font-size: 12px;
            border-top: 1px solid rgba(0, 0, 0, 0.08);
            margin-top: 50px;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 25px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            animation: scaleIn 0.3s ease;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .modal-title {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 900;
        }

        .modal-close {
            width: 40px;
            height: 40px;
            background: rgba(0, 0, 0, 0.05);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            background: rgba(0, 0, 0, 0.1);
        }

        .modal-field {
            margin-bottom: 20px;
        }

        .modal-label {
            font-size: 12px;
            color: #888888;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .modal-value {
            font-size: 15px;
            color: #000000;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .header {
                padding: 20px;
            }

            .page-content {
                padding: 20px;
            }

            .cards-horizontal {
                grid-template-columns: 1fr;
            }

            .section-title {
                font-size: 20px;
            }

            .greeting-text {
                font-size: 18px;
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 15px;
            }

            .page-content {
                padding: 15px;
            }

            .card {
                border-radius: 20px;
                padding: 20px;
                min-width: 100%;
            }

            .cards-horizontal {
                grid-template-columns: 1fr;
            }

            .modal-content {
                padding: 25px;
                border-radius: 20px;
            }

            .sidebar {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<!-- SIDEBAR OVERLAY -->
<div id="sidebarOverlay" class="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-logo-wrapper">
            <div class="sidebar-logo"></div>
            <div class="sidebar-title">Glonetech</div>
        </div>
        <button class="sidebar-close" onclick="closeSidebar()">×</button>
    </div>

    <nav class="sidebar-menu">
        <button class="sidebar-item active" onclick="goToPage('dashboard')">
            <i class="fas fa-home"></i> Dashboard
        </button>
        <button class="sidebar-item" onclick="goToPage('tasks')">
            <i class="fas fa-tasks"></i> Tasks
        </button>
        <button class="sidebar-item" onclick="goToPage('events')">
            <i class="fas fa-calendar"></i> Event Calendar
        </button>
        <button class="sidebar-item" onclick="goToPage('content')">
            <i class="fas fa-image"></i> Content Calendar
        </button>
        <button class="sidebar-item" onclick="goToPage('contributions')">
            <i class="fas fa-comments"></i> Contributions
        </button>
        <button class="sidebar-item" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i> Logout
        </button>
    </nav>
</div>

<div class="dashboard-layout">
    <!-- HEADER -->
    <div class="header">
        <div class="header-left">
            <button class="hamburger-btn" onclick="openSidebar()">
                <i class="fas fa-bars"></i>
            </button>
            <div class="logo"></div>
            <div class="greeting">
                <div class="greeting-time" id="greetingTime">Good Morning</div>
                <div class="greeting-text" id="greetingName">Welcome back!</div>
            </div>
        </div>
        <div class="header-right">
            <button class="header-btn"><i class="fas fa-bell"></i></button>
            <button class="header-btn"><i class="fas fa-cog"></i></button>
        </div>
    </div>

    <!-- CONTENT -->
    <div class="page-content">
        <!-- TASKS SECTION -->
        <section class="section">
            <div class="section-header">
                <h2 class="section-title">Your Tasks</h2>
                <span class="section-view-more" onclick="goToPage('tasks')">View All <i class="fas fa-arrow-right"></i></span>
            </div>
            <div class="cards-horizontal" id="tasksContainer">
                <!-- Tasks loaded here -->
            </div>
        </section>

        <!-- EVENTS SECTION -->
        <section class="section">
            <div class="section-header">
                <h2 class="section-title">Upcoming Events</h2>
                <span class="section-view-more" onclick="goToPage('events')">View All <i class="fas fa-arrow-right"></i></span>
            </div>
            <div class="cards-horizontal" id="eventsContainer">
                <!-- Events loaded here -->
            </div>
        </section>

        <!-- CONTENT CALENDAR SECTION -->
        <section class="section">
            <div class="section-header">
                <h2 class="section-title">Content Calendar</h2>
                <span class="section-view-more" onclick="goToPage('content')">View All <i class="fas fa-arrow-right"></i></span>
            </div>
            <div class="cards-horizontal" id="contentContainer">
                <!-- Content loaded here -->
            </div>
        </section>
    </div>

    <!-- FOOTER -->
    <footer>
        All rights reserved © Glonetech Solutions
    </footer>
</div>

<!-- TASK DETAILS MODAL -->
<div id="taskModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 class="modal-title" id="taskModalTitle">Task Details</h2>
            <button class="modal-close" onclick="closeModal('taskModal')">×</button>
        </div>
        <div id="taskModalBody"></div>
    </div>
</div>

<script src="api.js"></script>
<script>
    let dashboardTasks = [];
    let dashboardEvents = [];
    let dashboardContent = [];

    // SIDEBAR FUNCTIONS
    function openSidebar() {
        document.getElementById('sidebar').classList.add('show');
        document.getElementById('sidebarOverlay').classList.add('show');
    }

    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('show');
        document.getElementById('sidebarOverlay').classList.remove('show');
    }

    // NAVIGATE
    function goToPage(page) {
        closeSidebar();
        setTimeout(() => {
            window.location.href = page + '.html';
        }, 300);
    }

    // GET GREETING
    function getGreeting() {
        const hour = new Date().getHours();
        if (hour < 12) return 'Good Morning';
        if (hour < 18) return 'Good Afternoon';
        return 'Good Evening';
    }

    // INIT
    function init() {
        document.getElementById('greetingTime').textContent = getGreeting();
        loadTasks();
        loadEvents();
        loadContent();
    }

    // LOAD TASKS
    async function loadTasks() {
        try {
            const response = await apiRequest('/api/tasks');
            if (!response || !response.ok) {
                const errorData = response?.data || {};
                throw new Error(errorData.message || 'Unable to load tasks');
            }

            const data = response.data || {};
            dashboardTasks = data.data || [];
            
            // Filter tasks for non-admin users (executives and employees see only their assigned tasks)
            const currentUser = getUser();
            if (currentUser && currentUser.role !== 'admin') {
                const currentUserId = Number(currentUser.id);
                dashboardTasks = dashboardTasks.filter(task => Number(task.assigned_to?.id) === currentUserId);
            }
            
            if (dashboardTasks.length === 0) {
                document.getElementById('tasksContainer').innerHTML = `
                    <div class="card">
                        <div class="empty-state">
                            <div class="empty-state-icon"><i class="fas fa-inbox"></i></div>
                            <h3 class="empty-state-title">No Tasks</h3>
                            <p class="empty-state-text">You have no tasks assigned right now.</p>
                        </div>
                    </div>
                `;
                return;
            }

            const tasksHTML = dashboardTasks.map(task => {
                const priorityClass = task.priority === 'high' ? 'priority-high' : task.priority === 'medium' ? 'priority-medium' : 'priority-low';
                const statusClass = task.status === 'completed' ? 'status-completed' : task.status === 'pending' ? 'status-pending' : 'status-in-progress';
                const statusLabel = task.status.charAt(0).toUpperCase() + task.status.slice(1).replace(/_/g, ' ');
                const deadline = task.deadline ? new Date(task.deadline).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : 'No deadline';
                const assignedBy = task.assigned_by?.name || 'Unknown';

                let actionButtons = '';
                if (task.status === 'pending') {
                    actionButtons = `
                        <button class="task-more-btn" onclick="beginTask(${task.id})"><i class="fas fa-play"></i> Begin Task</button>
                    `;
                } else if (task.status === 'in_progress') {
                    actionButtons = `
                        <button class="task-more-btn" onclick="completeTask(${task.id})"><i class="fas fa-check"></i> Mark Complete</button>
                    `;
                }

                return `
                    <div class="card">
                        <div class="task-header">
                            <span class="task-priority ${priorityClass}">${task.priority.charAt(0).toUpperCase() + task.priority.slice(1)}</span>
                            <span class="task-status ${statusClass}">${statusLabel}</span>
                        </div>
                        <h3 class="task-title">${task.title}</h3>
                        <div class="task-meta">Assigned by: ${assignedBy}</div>
                        <div class="task-deadline"><i class="fas fa-calendar"></i> ${deadline}</div>
                        <div class="task-actions">
                            <button class="task-more-btn" onclick="openTaskModal(${task.id}, 'task')"><i class="fas fa-info-circle"></i> View Details</button>
                            ${actionButtons}
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('tasksContainer').innerHTML = tasksHTML;
        } catch (error) {
            console.error('Error loading tasks:', error);
            document.getElementById('tasksContainer').innerHTML = `
                <div class="card">
                    <div class="empty-state">
                        <div class="empty-state-icon"><i class="fas fa-exclamation-triangle"></i></div>
                        <h3 class="empty-state-title">Tasks unavailable</h3>
                        <p class="empty-state-text">Please refresh the page or try again later.</p>
                    </div>
                </div>
            `;
        }
    }

    // LOAD EVENTS
    async function loadEvents() {
        try {
            const response = await apiRequest('/api/events');
            if (!response || !response.ok) {
                const errorData = response?.data || {};
                throw new Error(errorData.message || 'Unable to load events');
            }

            const data = response.data || {};
            dashboardEvents = data.data || [];
            if (dashboardEvents.length === 0) {
                document.getElementById('eventsContainer').innerHTML = `
                    <div class="card">
                        <div class="empty-state">
                            <div class="empty-state-icon"><i class="fas fa-calendar-day"></i></div>
                            <h3 class="empty-state-title">No Events</h3>
                            <p class="empty-state-text">No upcoming events have been scheduled.</p>
                        </div>
                    </div>
                `;
                return;
            }

            const eventsHTML = dashboardEvents.map(event => {
                const eventDate = event.date ? new Date(event.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : 'TBD';
                const eventTime = event.time ? event.time : 'TBD';

                return `
                    <div class="card">
                        <div class="event-date"><i class="fas fa-calendar"></i> ${eventDate}</div>
                        <h3 class="event-name">${event.name}</h3>
                        <div class="event-time"><i class="fas fa-clock"></i> ${eventTime}</div>
                        <button class="event-more-btn" onclick="openTaskModal(${event.id}, 'event')">More Details</button>
                    </div>
                `;
            }).join('');

            document.getElementById('eventsContainer').innerHTML = eventsHTML;
        } catch (error) {
            console.error('Error loading events:', error);
            document.getElementById('eventsContainer').innerHTML = `
                <div class="card">
                    <div class="empty-state">
                        <div class="empty-state-icon"><i class="fas fa-exclamation-triangle"></i></div>
                        <h3 class="empty-state-title">Events unavailable</h3>
                        <p class="empty-state-text">Please refresh the page or try again later.</p>
                    </div>
                </div>
            `;
        }
    }

    // LOAD CONTENT
    async function loadContent() {
        try {
            const response = await apiRequest('/api/content');
            if (!response || !response.ok) {
                const errorData = response?.data || {};
                throw new Error(errorData.message || 'Unable to load content');
            }

            const data = response.data || {};
            dashboardContent = data.data || [];
            if (dashboardContent.length === 0) {
                document.getElementById('contentContainer').innerHTML = `
                    <div class="card">
                        <div class="empty-state">
                            <div class="empty-state-icon"><i class="fas fa-images"></i></div>
                            <h3 class="empty-state-title">No Content</h3>
                            <p class="empty-state-text">No content is scheduled yet.</p>
                        </div>
                    </div>
                `;
                return;
            }

            const platformIcons = {
                instagram: 'fab fa-instagram',
                linkedin: 'fab fa-linkedin',
                youtube: 'fab fa-youtube',
                tiktok: 'fab fa-tiktok',
                facebook: 'fab fa-facebook',
                x: 'fab fa-x-twitter',
            };

            const grouped = dashboardContent.reduce((acc, item) => {
                const platform = item.platform || 'other';
                if (!acc[platform]) acc[platform] = [];
                acc[platform].push(item);
                return acc;
            }, {});

            const contentHTML = Object.entries(grouped).map(([platform, items]) => {
                const platformName = platform.charAt(0).toUpperCase() + platform.slice(1);
                const icon = platformIcons[platform] || 'fas fa-hashtag';
                const itemsHtml = items.map(content => {
                    const contentDate = content.post_date || content.date || '';
                    const dateText = contentDate ? new Date(contentDate).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : 'TBD';
                    return `
                        <div class="content-item">
                            <div class="content-date">${dateText}</div>
                            <div class="content-title">${content.title}</div>
                            <button class="content-more-btn" onclick="openTaskModal(${content.id}, 'content')">View Details</button>
                        </div>
                    `;
                }).join('');

                return `
                    <div class="card">
                        <div class="platform-header">
                            <div class="platform-icon"><i class="${icon}"></i></div>
                            <div class="platform-name">${platformName}</div>
                        </div>
                        ${itemsHtml}
                    </div>
                `;
            }).join('');

            document.getElementById('contentContainer').innerHTML = contentHTML;
        } catch (error) {
            console.error('Error loading content:', error);
            document.getElementById('contentContainer').innerHTML = `
                <div class="card">
                    <div class="empty-state">
                        <div class="empty-state-icon"><i class="fas fa-exclamation-triangle"></i></div>
                        <h3 class="empty-state-title">Content unavailable</h3>
                        <p class="empty-state-text">Please refresh the page or try again later.</p>
                    </div>
                </div>
            `;
        }
    }

    // OPEN TASK MODAL
    function openTaskModal(itemId, itemType) {
        let title = '';
        let description = '';
        let meta = [];

        if (itemType === 'task') {
            const task = dashboardTasks.find(item => item.id === itemId);
            if (!task) return;
            title = task.title;
            description = task.description || 'No description provided.';
            meta = [
                { label: 'Assigned By', value: task.assigned_by?.name || 'Unknown' },
                { label: 'Deadline', value: task.deadline ? new Date(task.deadline).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : 'No deadline' },
                { label: 'Priority', value: task.priority },
                { label: 'Status', value: task.status.replace(/_/g, ' ').toUpperCase() },
            ];
        } else if (itemType === 'event') {
            const event = dashboardEvents.find(item => item.id === itemId);
            if (!event) return;
            title = event.name;
            description = event.description || 'No description provided.';
            meta = [
                { label: 'Date', value: event.date ? new Date(event.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : 'TBD' },
                { label: 'Time', value: event.time || 'TBD' },
                { label: 'Location', value: event.location || 'TBD' },
                { label: 'Organizer', value: event.organizer || 'TBD' },
            ];
        } else if (itemType === 'content') {
            const content = dashboardContent.find(item => item.id === itemId);
            if (!content) return;
            title = content.title;
            description = content.description || 'No description provided.';
            meta = [
                { label: 'Platform', value: content.platform || 'Unknown' },
                { label: 'Post Date', value: content.post_date ? new Date(content.post_date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : 'TBD' },
                { label: 'Review Time', value: content.review_time || content.reviewTime || 'TBD' },
                { label: 'Organizer', value: content.organizer || 'TBD' },
            ];
        }

        const metaHtml = meta.map(field => `
            <div class="modal-field">
                <div class="modal-label">${field.label}</div>
                <div class="modal-value">${field.value}</div>
            </div>
        `).join('');

        document.getElementById('taskModalTitle').textContent = title;
        document.getElementById('taskModalBody').innerHTML = `
            <div class="modal-field">
                <div class="modal-label">Description</div>
                <div class="modal-value">${description}</div>
            </div>
            ${metaHtml}
        `;
        document.getElementById('taskModal').classList.add('show');
    }

    async function beginTask(taskId) {
        try {
            const response = await apiRequest(`/api/tasks/${taskId}/begin`, 'PUT');
            if (!response) return;
            const result = response.data || {};
            if (!response.ok || !result.success) {
                throw new Error(result.message || 'Failed to begin task');
            }
            await loadTasks();
            showNotification('Task started! Status changed to In Progress', 'success');
        } catch (error) {
            console.error('Error beginning task:', error);
            showNotification(error.message || 'Could not begin task', 'error');
        }
    }

    async function completeTask(taskId) {
        try {
            const response = await apiRequest(`/api/tasks/${taskId}/complete`, 'PUT');
            if (!response) return;
            const result = response.data || {};
            if (!response.ok || !result.success) {
                throw new Error(result.message || 'Failed to complete task');
            }
            await loadTasks();
            showNotification('Task marked as completed', 'success');
        } catch (error) {
            console.error('Error completing task:', error);
            showNotification(error.message || 'Could not complete task', 'error');
        }
    }

    //window.location.replace('index.html');

    //window.location.href = 'admindashboard.html';



    function logout() {
        localStorage.clear();
        sessionStorage.clear();
        window.location.replace('index.html');
    }

    // CLOSE MODAL
    function closeModal(id) {
        document.getElementById(id).classList.remove('show');
    }

    // SHOW NOTIFICATION
    function showNotification(message, type = 'info') {
        const notification = document.createElement('div');
        notification.style.cssText = `
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            background: ${type === 'success' ? '#4caf50' : type === 'error' ? '#f44336' : '#2196F3'};
            color: white;
            border-radius: 8px;
            z-index: 1000;
            animation: slideInRight 0.3s ease;
            font-weight: 600;
        `;
        notification.textContent = message;
        document.body.appendChild(notification);
        setTimeout(() => {
            notification.style.animation = 'slideOutRight 0.3s ease';
            setTimeout(() => notification.remove(), 300);
        }, 3000);
    }

    // CLOSE MODAL ON OUTSIDE CLICK
    window.addEventListener('click', (e) => {
        const modal = document.getElementById('taskModal');
        if (e.target === modal) {
            modal.classList.remove('show');
        }
    });

    // INIT ON LOAD
    document.addEventListener('DOMContentLoaded', () => {
        if (!requireAuth()) return;
        init();
    });
</script>
