<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glonetech - Content Calendar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --logo-url: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text x="50" y="70" font-size="80" font-weight="bold" text-anchor="middle" fill="%23ffffff">G</text></svg>');
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f5f5 0%, #ffffff 100%);
            color: #000000;
            overflow-x: hidden;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes slideInSidebar {
            from { opacity: 0; transform: translateX(-100%); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes fadeInDim {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* SIDEBAR */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 99;
            animation: fadeInDim 0.3s ease;
        }

        .sidebar-overlay.show {
            display: block;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            background: linear-gradient(180deg, #ffffff 0%, #f8f8f8 100%);
            border-right: 1px solid rgba(0, 0, 0, 0.08);
            z-index: 100;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            overflow-y: auto;
        }

        .sidebar.show {
            transform: translateX(0);
        }

        .sidebar-header {
            padding: 25px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-logo-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .sidebar-logo {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #000000 0%, #333333 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 900;
            font-size: 20px;
            background-image: var(--logo-url);
            background-size: cover;
            background-position: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .sidebar-title {
            font-family: 'Playfair Display', serif;
            font-size: 16px;
            font-weight: 700;
        }

        .sidebar-close {
            width: 35px;
            height: 35px;
            background: rgba(0, 0, 0, 0.05);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sidebar-close:hover {
            background: rgba(0, 0, 0, 0.1);
        }

        .sidebar-menu {
            padding: 25px 10px;
        }

        .sidebar-item {
            width: 100%;
            padding: 14px 15px;
            background: transparent;
            border: none;
            color: #666666;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            text-align: left;
            transition: all 0.3s ease;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
            font-family: 'Inter', sans-serif;
        }

        .sidebar-item:hover {
            background: rgba(0, 0, 0, 0.08);
            color: #000000;
        }

        .sidebar-item.active {
            background: linear-gradient(135deg, #000000 0%, #333333 100%);
            color: white;
        }

        .sidebar-item i {
            width: 18px;
            text-align: center;
        }

        /* LAYOUT */
        .dashboard-layout {
            display: grid;
            grid-template-columns: 1fr;
            min-height: 100vh;
        }

        /* HEADER */
        .header {
            background: linear-gradient(135deg, #ffffff 0%, #f8f8f8 100%);
            padding: 25px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            animation: fadeUp 0.8s ease;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .hamburger-btn {
            width: 45px;
            height: 45px;
            background: rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .hamburger-btn:hover {
            background: rgba(0, 0, 0, 0.1);
        }

        .logo {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #000000 0%, #333333 100%);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 900;
            font-size: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            background-image: var(--logo-url);
            background-size: cover;
            background-position: center;
        }

        .greeting {
            font-family: 'Playfair Display', serif;
        }

        .greeting-time {
            font-size: 12px;
            color: #888888;
            font-family: 'Space Grotesk', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .greeting-text {
            font-size: 24px;
            font-weight: 900;
            margin-top: 3px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-btn {
            width: 45px;
            height: 45px;
            background: rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000000;
            font-size: 18px;
        }

        .header-btn:hover {
            background: rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }

        /* PAGE CONTENT */
        .page-content {
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 35px;
            animation: fadeUp 0.8s ease;
        }

        .page-title-section h1 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 10px;
        }

        .page-title-section p {
            font-size: 14px;
            color: #888888;
            font-weight: 500;
        }

        .add-content-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #000000 0%, #333333 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .add-content-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        /* PLATFORM TABS */
        .platform-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            animation: fadeUp 0.8s ease 0.1s both;
        }

        .tab-btn {
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn:hover {
            background: rgba(0, 0, 0, 0.1);
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #000000 0%, #333333 100%);
            color: white;
            border-color: #000000;
        }

        /* CONTENT GRID */
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        .content-card {
            background: linear-gradient(135deg, #ffffff 0%, #f8f8f8 100%);
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 25px;
            padding: 30px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            animation: scaleIn 0.6s ease;
        }

        .content-card:hover {
            border-color: rgba(0, 0, 0, 0.2);
            transform: translateY(-8px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
        }

        .content-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 18px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        }

        .content-date-badge {
            background: linear-gradient(135deg, #000000 0%, #333333 100%);
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .content-menu-btn {
            width: 35px;
            height: 35px;
            background: rgba(0, 0, 0, 0.05);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .content-menu-btn:hover {
            background: rgba(0, 0, 0, 0.1);
        }

        .content-card-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .content-card-description {
            font-size: 13px;
            color: #888888;
            margin-bottom: 18px;
            line-height: 1.5;
        }

        .content-meta-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            font-size: 13px;
            color: #888888;
        }

        .content-meta-label {
            font-weight: 600;
            color: #000000;
            min-width: 80px;
        }

        .content-meta-value {
            flex: 1;
        }

        .content-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid rgba(0, 0, 0, 0.08);
        }

        .content-action-btn {
            flex: 1;
            padding: 10px;
            background: rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .content-action-btn:hover {
            background: rgba(0, 0, 0, 0.1);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            animation: fadeUp 0.8s ease;
        }

        .empty-state-icon {
            font-size: 48px;
            color: rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .empty-state-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .empty-state-text {
            color: #888888;
            font-size: 14px;
        }

        /* FORM STYLES */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            color: #888888;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: #000000;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            background: rgba(0, 0, 0, 0.08);
            border-color: #000000;
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.05);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 25px;
        }

        .form-btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 13px;
        }

        .form-btn.submit {
            background: linear-gradient(135deg, #000000 0%, #333333 100%);
            color: white;
        }

        .form-btn.submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .form-btn.cancel {
            background: rgba(0, 0, 0, 0.05);
            color: #000000;
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        .form-btn.cancel:hover {
            background: rgba(0, 0, 0, 0.1);
        }

        /* NOTIFICATION */
        .notification {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #4caf50 0%, #45a049 100%);
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            z-index: 300;
            transition: bottom 0.4s ease;
            font-weight: 600;
            max-width: 400px;
        }

        .notification.show {
            bottom: 30px;
        }

        .notification.error {
            background: linear-gradient(135deg, #ff3b30 0%, #ff1744 100%);
        }

        .notification.info {
            background: linear-gradient(135deg, #2196f3 0%, #1976d2 100%);
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 25px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            animation: scaleIn 0.3s ease;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .modal-title {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 900;
        }

        .modal-close {
            width: 40px;
            height: 40px;
            background: rgba(0, 0, 0, 0.05);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            background: rgba(0, 0, 0, 0.1);
        }

        .modal-field {
            margin-bottom: 20px;
        }

        .modal-label {
            font-size: 12px;
            color: #888888;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .modal-value {
            font-size: 15px;
            color: #000000;
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 30px;
            color: #888888;
            font-size: 12px;
            border-top: 1px solid rgba(0, 0, 0, 0.08);
            margin-top: 50px;
        }

        @media (max-width: 768px) {
            .header {
                padding: 20px;
            }

            .page-content {
                padding: 20px;
            }

            .content-grid {
                grid-template-columns: 1fr;
            }

            .page-header {
                flex-direction: column;
                gap: 20px;
            }

            .add-content-btn {
                width: 100%;
                justify-content: center;
            }

            .platform-tabs {
                flex-direction: column;
            }

            .tab-btn {
                width: 100%;
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 15px;
            }

            .page-content {
                padding: 15px;
            }

            .content-card {
                border-radius: 20px;
                padding: 20px;
            }

            .modal-content {
                padding: 25px;
                border-radius: 20px;
            }
        }
    </style>
</head>
<body>

<!-- SIDEBAR OVERLAY -->
<div id="sidebarOverlay" class="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-logo-wrapper">
            <div class="sidebar-logo"></div>
            <div class="sidebar-title">Glonetech</div>
        </div>
        <button class="sidebar-close" onclick="closeSidebar()">×</button>
    </div>

    <nav class="sidebar-menu">
        <button class="sidebar-item" onclick="goToPage('admindashboard')">
            <i class="fas fa-home"></i> Dashboard
        </button>
        <button class="sidebar-item" onclick="goToPage('admintasks')">
            <i class="fas fa-tasks"></i> Tasks
        </button>
        <button class="sidebar-item" onclick="goToPage('finance')">
            <i class="fas fa-dollar-sign"></i> Finance
        </button>
        <button class="sidebar-item" onclick="goToPage('adminevents')">
            <i class="fas fa-calendar"></i> Event Calendar
        </button>
        <button class="sidebar-item active" onclick="goToPage('admincontent')">
            <i class="fas fa-image"></i> Content Calendar
        </button>
        <button class="sidebar-item" onclick="goToPage('admincontributions')">
            <i class="fas fa-comments"></i> Contributions
        </button>
        <button class="sidebar-item" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i> Logout
        </button>
    </nav>
</div>

<div class="dashboard-layout">
    <!-- HEADER -->
    <div class="header">
        <div class="header-left">
            <button class="hamburger-btn" onclick="openSidebar()">
                <i class="fas fa-bars"></i>
            </button>
            <div class="logo"></div>
            <div class="greeting">
                <div class="greeting-time" id="greetingTime">Good Morning</div>
                <div class="greeting-text">Content</div>
            </div>
        </div>
        <div class="header-right">
            <button class="header-btn"><i class="fas fa-bell"></i></button>
            <button class="header-btn"><i class="fas fa-cog"></i></button>
        </div>
    </div>

    <!-- CONTENT -->
    <div class="page-content">
        <div class="page-header">
            <div class="page-title-section">
                <h1>Content Calendar</h1>
                <p>Manage content across all social platforms</p>
            </div>
            <button class="add-content-btn" onclick="openAddContentModal()">
                <i class="fas fa-plus"></i> Add Content
            </button>
        </div>

        <!-- PLATFORM TABS -->
        <div class="platform-tabs">
            <button class="tab-btn active" onclick="filterByPlatform('all')">
                <i class="fas fa-th"></i> All Platforms
            </button>
            <button class="tab-btn" onclick="filterByPlatform('instagram')">
                <i class="fab fa-instagram"></i> Instagram
            </button>
            <button class="tab-btn" onclick="filterByPlatform('linkedin')">
                <i class="fab fa-linkedin"></i> LinkedIn
            </button>
            <button class="tab-btn" onclick="filterByPlatform('youtube')">
                <i class="fab fa-youtube"></i> YouTube
            </button>
            <button class="tab-btn" onclick="filterByPlatform('tiktok')">
                <i class="fab fa-tiktok"></i> TikTok
            </button>
            <button class="tab-btn" onclick="filterByPlatform('facebook')">
                <i class="fab fa-facebook"></i> Facebook
            </button>
            <button class="tab-btn" onclick="filterByPlatform('x')">
                <i class="fab fa-x-twitter"></i> X
            </button>
        </div>

        <!-- CONTENT GRID -->
        <div class="content-grid" id="contentContainer">
            <!-- Content loaded here -->
        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        All rights reserved © Glonetech Solutions
    </footer>
</div>

<!-- CONTENT DETAILS MODAL -->
<div id="contentModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 class="modal-title" id="contentModalTitle">Content Details</h2>
            <button class="modal-close" onclick="closeModal('contentModal')">×</button>
        </div>
        <div id="contentModalBody"></div>
    </div>
</div>

<!-- ADD CONTENT MODAL -->
<div id="addContentModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 class="modal-title">Add New Content</h2>
            <button class="modal-close" onclick="closeModal('addContentModal')">×</button>
        </div>
        <form id="addContentForm">
            <div class="form-group">
                <label for="addContentTitle">Content Title</label>
                <input type="text" id="addContentTitle" placeholder="Enter content title" required>
            </div>

            <div class="form-group">
                <label for="addContentDescription">Description</label>
                <textarea id="addContentDescription" placeholder="Enter content description" required></textarea>
            </div>

            <div class="form-group">
                <label for="addContentPlatform">Platform</label>
                <select id="addContentPlatform" required>
                    <option value="instagram">Instagram</option>
                    <option value="linkedin">LinkedIn</option>
                    <option value="youtube">YouTube</option>
                    <option value="tiktok">TikTok</option>
                    <option value="facebook">Facebook</option>
                    <option value="x">X</option>
                </select>
            </div>

            <div class="form-group">
                <label for="addContentDate">Post Date</label>
                <input type="date" id="addContentDate" required>
            </div>

            <div class="form-group">
                <label for="addContentOrganizer">Content Creator</label>
                <input type="text" id="addContentOrganizer" placeholder="Creator name" required>
            </div>

            <div class="form-group">
                <label for="addContentReviewTime">Review Time</label>
                <input type="time" id="addContentReviewTime" required>
            </div>

            <div class="form-actions">
                <button type="button" class="form-btn cancel" onclick="closeModal('addContentModal')">Cancel</button>
                <button type="button" class="form-btn submit" onclick="saveNewContent()">Add Content</button>
            </div>
        </form>
    </div>
</div>

<!-- NOTIFICATION -->
<div id="notification" class="notification"></div>

<script>
    let contentData = [];

    let currentPlatform = 'all';

    // SIDEBAR FUNCTIONS
    function openSidebar() {
        document.getElementById('sidebar').classList.add('show');
        document.getElementById('sidebarOverlay').classList.add('show');
    }

    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('show');
        document.getElementById('sidebarOverlay').classList.remove('show');
    }

    // NAVIGATE
    function goToPage(page) {
        closeSidebar();
        // In real implementation: window.location.href = page + '.html';
    }

    // FILTER BY PLATFORM
    function filterByPlatform(platform) {
        currentPlatform = platform;
        
        // Update active button
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.remove('active');
        });
        event.target.closest('.tab-btn').classList.add('active');

        loadContent();
    }

    // GET GREETING
    function getGreeting() {
        const hour = new Date().getHours();
        if (hour < 12) return 'Good Morning';
        if (hour < 18) return 'Good Afternoon';
        return 'Good Evening';
    }

    // INIT
    function init() {
        document.getElementById('greetingTime').textContent = getGreeting();
        loadContent();
    }

    // LOAD CONTENT
    async function loadContent() {
        try {
            const response = await apiRequest('/api/content');
            if (!response.ok) {
                throw new Error('Unable to load content');
            }
            const apiResponse = response.data;
            console.log('Content API Response:', apiResponse);
            const rawItems = Array.isArray(apiResponse.data) ? apiResponse.data : (apiResponse.data?.content || []);
            console.log('Raw Items:', rawItems);
            contentData = rawItems.map(item => ({
                ...item,
                date: item.post_date || item.date || '',
                reviewTime: item.review_time || item.reviewTime || '',
            }));
            console.log('Processed Content Data:', contentData);
            
            let filtered = contentData;
            
            if (currentPlatform !== 'all') {
                filtered = contentData.filter(c => c.platform === currentPlatform);
            }

            const container = document.getElementById('contentContainer');

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div style="grid-column: 1/-1;">
                        <div class="empty-state">
                            <div class="empty-state-icon"><i class="fas fa-images"></i></div>
                            <h3 class="empty-state-title">No Content Yet</h3>
                            <p class="empty-state-text">No content scheduled for ${currentPlatform === 'all' ? 'this' : 'the ' + currentPlatform} platform</p>
                        </div>
                    </div>
                `;
                return;
            }

            let html = '';
            filtered.forEach((content, idx) => {
                const contentDate = new Date(content.date);
                const dateStr = contentDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                
                const platformIcons = {
                    'instagram': 'fab fa-instagram',
                    'linkedin': 'fab fa-linkedin',
                    'youtube': 'fab fa-youtube',
                    'tiktok': 'fab fa-tiktok',
                    'facebook': 'fab fa-facebook',
                    'x': 'fab fa-x-twitter'
                };

                html += `
                    <div class="content-card" style="animation-delay: ${idx * 0.1}s;">
                        <div class="content-card-header">
                            <span class="content-date-badge">${dateStr}</span>
                            <button class="content-menu-btn">
                                <i class="fas fa-ellipsis-v"></i>
                            </button>
                        </div>

                        <h3 class="content-card-title">${content.title}</h3>
                        <p class="content-card-description">${content.description}</p>

                        <div class="content-meta-row">
                            <span class="content-meta-label"><i class="${platformIcons[content.platform]}"></i></span>
                            <span class="content-meta-value">${content.platform.toUpperCase()}</span>
                        </div>

                        <div class="content-meta-row">
                            <span class="content-meta-label"><i class="fas fa-user"></i></span>
                            <span class="content-meta-value">${content.organizer}</span>
                        </div>

                        <div class="content-meta-row">
                            <span class="content-meta-label"><i class="fas fa-clock"></i></span>
                            <span class="content-meta-value">Review at ${content.reviewTime}</span>
                        </div>

                        <div class="content-actions">
                            <button class="content-action-btn" onclick="openContentModal('${content.title}', '${content.description}', '${content.platform}', '${content.date}', '${content.reviewTime}', '${content.organizer}')">
                                View Details
                            </button>
                            <button class="content-action-btn">
                                <i class="fas fa-edit"></i> Edit
                            </button>
                            <button class="content-action-btn delete-btn" onclick="deleteContent(${content.id})">
                                <i class="fas fa-trash"></i> Delete
                            </button>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        } catch (error) {
            console.error('Error loading content:', error);
            showNotification('Failed to load content', 'error');
        }
    }

    // OPEN CONTENT MODAL
    function openContentModal(title, description, platform, date, reviewTime, organizer) {
        document.getElementById('contentModalTitle').textContent = title;
        document.getElementById('contentModalBody').innerHTML = `
            <div class="modal-field">
                <div class="modal-label">Description</div>
                <div class="modal-value">${description}</div>
            </div>
            <div class="modal-field">
                <div class="modal-label">Platform</div>
                <div class="modal-value">${platform.toUpperCase()}</div>
            </div>
            <div class="modal-field">
                <div class="modal-label">Post Date</div>
                <div class="modal-value">${new Date(date).toLocaleDateString()}</div>
            </div>
            <div class="modal-field">
                <div class="modal-label">Review Time</div>
                <div class="modal-value">${reviewTime}</div>
            </div>
            <div class="modal-field">
                <div class="modal-label">Content Creator</div>
                <div class="modal-value">${organizer}</div>
            </div>
        `;
        document.getElementById('contentModal').classList.add('show');
    }

    // OPEN ADD CONTENT MODAL
    function openAddContentModal() {
        document.getElementById('addContentModal').classList.add('show');
    }

    // SAVE NEW CONTENT
    async function saveNewContent() {
        const title = document.getElementById('addContentTitle').value.trim();
        const description = document.getElementById('addContentDescription').value.trim();
        const platform = document.getElementById('addContentPlatform').value;
        const date = document.getElementById('addContentDate').value;
        const organizer = document.getElementById('addContentOrganizer').value.trim();
        const reviewTime = document.getElementById('addContentReviewTime').value;

        if (!title || !description || !platform || !date || !organizer || !reviewTime) {
            showNotification('Please fill all fields', 'error');
            return;
        }

        try {
            const newContent = {
                title,
                description,
                platform,
                post_date: date,
                review_time: reviewTime,
                organizer,
            };

            await apiRequest('/api/content', 'POST', newContent);
            
            // Clear form
            document.getElementById('addContentForm').reset();
            closeModal('addContentModal');
            await loadContent();
            showNotification('Content added successfully!', 'success');
        } catch (error) {
            console.error('Error creating content:', error);
            showNotification('Failed to add content', 'error');
        }
    }

    // DELETE CONTENT
    async function deleteContent(id) {
        if (!confirm('Are you sure you want to delete this content?')) {
            return;
        }

        try {
            await apiRequest(`/api/content/${id}`, 'DELETE');
            await loadContent();
            showNotification('Content deleted successfully!', 'success');
        } catch (error) {
            console.error('Error deleting content:', error);
            showNotification('Failed to delete content', 'error');
        }
    }

    // SHOW NOTIFICATION
    function showNotification(message, type = 'info') {
        const notification = document.getElementById('notification');
        notification.textContent = message;
        notification.className = `notification ${type} show`;
        
        setTimeout(() => {
            notification.classList.remove('show');
        }, 4000);
    }

    //logout
    //function logout() {
    // Optional: clear session/local storage
    //localStorage.clear();
    //sessionStorage.clear();

    // Prevent going back
    //window.location.replace('index.html');
    //}

    // Run on page load
    //if (!localStorage.getItem('isLoggedIn')) {
    //window.location.replace('index.html');
    //}

    //localStorage.setItem('isLoggedIn', 'true');
    //window.location.href = 'admindashboard.html';



    function goToPage(page) {
    closeSidebar();

    setTimeout(() => {
        window.location.href = page + '.html';
    }, 300);
    }

    function logout() {
        localStorage.clear();
        sessionStorage.clear();
        window.location.replace('index.html');
    }

    // CLOSE MODAL
    function closeModal(id) {
        document.getElementById(id).classList.remove('show');
    }

    // CLOSE MODAL ON OUTSIDE CLICK
    window.addEventListener('click', (e) => {
        const modals = document.querySelectorAll('.modal');
        modals.forEach(modal => {
            if (e.target === modal) {
                modal.classList.remove('show');
            }
        });
    });

    // INIT ON LOAD
    document.addEventListener('DOMContentLoaded', init);
</script>
<script src="api.js"></script>

</body>
</html>
