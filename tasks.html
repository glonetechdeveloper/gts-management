<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glonetech - Tasks</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --logo-url: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text x="50" y="70" font-size="80" font-weight="bold" text-anchor="middle" fill="%23ffffff">G</text></svg>');
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f5f5 0%, #ffffff 100%);
            color: #000000;
            overflow-x: hidden;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes slideInSidebar {
            from { opacity: 0; transform: translateX(-100%); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes fadeInDim {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* SIDEBAR */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 99;
            animation: fadeInDim 0.3s ease;
        }

        .sidebar-overlay.show {
            display: block;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            background: linear-gradient(180deg, #ffffff 0%, #f8f8f8 100%);
            border-right: 1px solid rgba(0, 0, 0, 0.08);
            z-index: 100;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            overflow-y: auto;
        }

        .sidebar.show {
            transform: translateX(0);
        }

        .sidebar-header {
            padding: 25px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-logo-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .sidebar-logo {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #000000 0%, #333333 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 900;
            font-size: 20px;
            background-image: var(--logo-url);
            background-size: cover;
            background-position: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .sidebar-title {
            font-family: 'Playfair Display', serif;
            font-size: 16px;
            font-weight: 700;
        }

        .sidebar-close {
            width: 35px;
            height: 35px;
            background: rgba(0, 0, 0, 0.05);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sidebar-close:hover {
            background: rgba(0, 0, 0, 0.1);
        }

        .sidebar-menu {
            padding: 25px 10px;
        }

        .sidebar-item {
            width: 100%;
            padding: 14px 15px;
            background: transparent;
            border: none;
            color: #666666;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            text-align: left;
            transition: all 0.3s ease;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
            font-family: 'Inter', sans-serif;
        }

        .sidebar-item:hover {
            background: rgba(0, 0, 0, 0.08);
            color: #000000;
        }

        .sidebar-item.active {
            background: linear-gradient(135deg, #000000 0%, #333333 100%);
            color: white;
        }

        .sidebar-item i {
            width: 18px;
            text-align: center;
        }

        /* LAYOUT */
        .dashboard-layout {
            display: grid;
            grid-template-columns: 1fr;
            min-height: 100vh;
        }

        /* HEADER */
        .header {
            background: linear-gradient(135deg, #ffffff 0%, #f8f8f8 100%);
            padding: 25px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            animation: fadeUp 0.8s ease;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .hamburger-btn {
            width: 45px;
            height: 45px;
            background: rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .hamburger-btn:hover {
            background: rgba(0, 0, 0, 0.1);
        }

        .logo {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #000000 0%, #333333 100%);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 900;
            font-size: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            background-image: var(--logo-url);
            background-size: cover;
            background-position: center;
        }

        .greeting {
            font-family: 'Playfair Display', serif;
        }

        .greeting-time {
            font-size: 12px;
            color: #888888;
            font-family: 'Space Grotesk', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .greeting-text {
            font-size: 24px;
            font-weight: 900;
            margin-top: 3px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-btn {
            width: 45px;
            height: 45px;
            background: rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000000;
            font-size: 18px;
        }

        .header-btn:hover {
            background: rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }

        /* PAGE CONTENT */
        .page-content {
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .page-header {
            margin-bottom: 35px;
            animation: fadeUp 0.8s ease;
        }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 10px;
        }

        .page-subtitle {
            font-size: 14px;
            color: #888888;
            font-weight: 500;
        }

        /* FILTERS */
        .filters-section {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            animation: fadeUp 0.8s ease 0.1s both;
        }

        .filter-btn {
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-btn:hover {
            background: rgba(0, 0, 0, 0.1);
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #000000 0%, #333333 100%);
            color: white;
            border-color: #000000;
        }

        /* TASKS GRID */
        .tasks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        .task-card {
            background: linear-gradient(135deg, #ffffff 0%, #f8f8f8 100%);
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 25px;
            padding: 30px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            animation: scaleIn 0.6s ease;
        }

        .task-card:hover {
            border-color: rgba(0, 0, 0, 0.2);
            transform: translateY(-8px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
        }

        .task-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 18px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        }

        .task-badges {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .task-priority-badge {
            font-size: 10px;
            font-weight: 700;
            padding: 6px 12px;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .priority-high {
            background: rgba(255, 59, 48, 0.2);
            color: #ff3b30;
        }

        .priority-medium {
            background: rgba(255, 149, 0, 0.2);
            color: #ff9500;
        }

        .priority-low {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
        }

        .task-status-badge {
            font-size: 10px;
            padding: 6px 12px;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-pending {
            background: rgba(255, 149, 0, 0.2);
            color: #ff9500;
        }

        .status-completed {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
        }

        .status-in-progress {
            background: rgba(33, 150, 243, 0.2);
            color: #2196f3;
        }

        .task-menu-btn {
            width: 35px;
            height: 35px;
            background: rgba(0, 0, 0, 0.05);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .task-menu-btn:hover {
            background: rgba(0, 0, 0, 0.1);
        }

        .task-card-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .task-card-description {
            font-size: 13px;
            color: #888888;
            margin-bottom: 18px;
            line-height: 1.5;
        }

        .task-meta-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
            font-size: 13px;
            color: #888888;
        }

        .task-meta-label {
            font-weight: 600;
            color: #000000;
            min-width: 80px;
        }

        .task-meta-value {
            flex: 1;
        }

        .task-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid rgba(0, 0, 0, 0.08);
        }

        .task-action-btn {
            flex: 1;
            padding: 10px;
            background: rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .task-action-btn:hover {
            background: rgba(0, 0, 0, 0.1);
        }

        .task-action-btn.complete {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            border-color: rgba(76, 175, 80, 0.3);
        }

        .task-action-btn.complete:hover {
            background: rgba(76, 175, 80, 0.3);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            animation: fadeUp 0.8s ease;
        }

        .empty-state-icon {
            font-size: 48px;
            color: rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .empty-state-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .empty-state-text {
            color: #888888;
            font-size: 14px;
        }

        /* NOTIFICATION */
        .notification {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #4caf50 0%, #45a049 100%);
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            z-index: 300;
            transition: bottom 0.4s ease;
            font-weight: 600;
            max-width: 400px;
        }

        .notification.show {
            bottom: 30px;
        }

        .notification.error {
            background: linear-gradient(135deg, #ff3b30 0%, #ff1744 100%);
        }

        .notification.info {
            background: linear-gradient(135deg, #2196f3 0%, #1976d2 100%);
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 30px;
            color: #888888;
            font-size: 12px;
            border-top: 1px solid rgba(0, 0, 0, 0.08);
            margin-top: 50px;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 25px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            animation: scaleIn 0.3s ease;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .modal-title {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 900;
        }

        .modal-close {
            width: 40px;
            height: 40px;
            background: rgba(0, 0, 0, 0.05);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            background: rgba(0, 0, 0, 0.1);
        }

        .modal-field {
            margin-bottom: 20px;
        }

        .modal-label {
            font-size: 12px;
            color: #888888;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .modal-value {
            font-size: 15px;
            color: #000000;
        }

        @media (max-width: 768px) {
            .header {
                padding: 20px;
            }

            .page-content {
                padding: 20px;
            }

            .tasks-grid {
                grid-template-columns: 1fr;
            }

            .page-title {
                font-size: 24px;
            }

            .filters-section {
                flex-direction: column;
            }

            .filter-btn {
                width: 100%;
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 15px;
            }

            .page-content {
                padding: 15px;
            }

            .task-card {
                border-radius: 20px;
                padding: 20px;
            }

            .modal-content {
                padding: 25px;
                border-radius: 20px;
            }
        }
    </style>
</head>
<body>

<!-- SIDEBAR OVERLAY -->
<div id="sidebarOverlay" class="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-logo-wrapper">
            <div class="sidebar-logo"></div>
            <div class="sidebar-title">Glonetech</div>
        </div>
        <button class="sidebar-close" onclick="closeSidebar()">×</button>
    </div>

    <nav class="sidebar-menu">
        <button class="sidebar-item" onclick="goToPage('dashboard')">
            <i class="fas fa-home"></i> Dashboard
        </button>
        <button class="sidebar-item active" onclick="goToPage('tasks')">
            <i class="fas fa-tasks"></i> Tasks
        </button>
        <button class="sidebar-item" onclick="goToPage('events')">
            <i class="fas fa-calendar"></i> Event Calendar
        </button>
        <button class="sidebar-item" onclick="goToPage('content')">
            <i class="fas fa-image"></i> Content Calendar
        </button>
        <button class="sidebar-item" onclick="goToPage('contributions')">
            <i class="fas fa-comments"></i> Contributions
        </button>
        <button class="sidebar-item" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i> Logout
        </button>
    </nav>
</div>

<div class="dashboard-layout">
    <!-- HEADER -->
    <div class="header">
        <div class="header-left">
            <button class="hamburger-btn" onclick="openSidebar()">
                <i class="fas fa-bars"></i>
            </button>
            <div class="logo"></div>
            <div class="greeting">
                <div class="greeting-time" id="greetingTime">Good Morning</div>
                <div class="greeting-text">Tasks</div>
            </div>
        </div>
        <div class="header-right">
            <button class="header-btn"><i class="fas fa-bell"></i></button>
            <button class="header-btn"><i class="fas fa-cog"></i></button>
        </div>
    </div>

    <!-- CONTENT -->
    <div class="page-content">
        <div class="page-header">
            <h1 class="page-title">Your Tasks</h1>
            <p class="page-subtitle">Manage and track all your assigned tasks</p>
        </div>

        <!-- FILTERS -->
        <div class="filters-section">
            <button class="filter-btn active" onclick="filterTasks('all', event)">
                <i class="fas fa-list"></i> All Tasks
            </button>
            <button class="filter-btn" onclick="filterTasks('pending', event)">
                <i class="fas fa-clock"></i> Pending
            </button>
            <button class="filter-btn" onclick="filterTasks('in_progress', event)">
                <i class="fas fa-spinner"></i> In Progress
            </button>
            <button class="filter-btn" onclick="filterTasks('completed', event)">
                <i class="fas fa-check"></i> Completed
            </button>
        </div>

        <!-- TASKS GRID -->
        <div class="tasks-grid" id="tasksContainer">
            <!-- Tasks loaded here -->
        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        All rights reserved © Glonetech Solutions
    </footer>
</div>

<!-- TASK DETAILS MODAL -->
<div id="taskModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 class="modal-title" id="taskModalTitle">Task Details</h2>
            <button class="modal-close" onclick="closeModal('taskModal')">×</button>
        </div>
        <div id="taskModalBody"></div>
    </div>
</div>

<!-- NOTIFICATION -->
<div id="notification" class="notification"></div>

<script src="api.js"></script>
<script>
    let tasksData = [];
    let currentFilter = 'all';

    // SIDEBAR FUNCTIONS
    function openSidebar() {
        document.getElementById('sidebar').classList.add('show');
        document.getElementById('sidebarOverlay').classList.add('show');
    }

    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('show');
        document.getElementById('sidebarOverlay').classList.remove('show');
    }

    function goToPage(page) {
        closeSidebar();
        setTimeout(() => {
            window.location.href = page + '.html';
        }, 300);
    }

    function filterTasks(status, event) {
        currentFilter = status;
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        if (event && event.target) {
            const button = event.target.closest('.filter-btn');
            if (button) {
                button.classList.add('active');
            }
        }
        loadTasks();
    }

    function getGreeting() {
        const hour = new Date().getHours();
        if (hour < 12) return 'Good Morning';
        if (hour < 18) return 'Good Afternoon';
        return 'Good Evening';
    }

    async function init() {
        if (!requireAuth()) return;
        document.getElementById('greetingTime').textContent = getGreeting();
        await loadTasks();
    }

    async function loadTasks() {
        const query = currentFilter !== 'all' ? `?status=${encodeURIComponent(currentFilter)}` : '';
        const response = await apiRequest(`/api/tasks${query}`, 'GET');
        if (!response) return;

        const result = response.data || {};
        if (!response.ok || !result.success) {
            showNotification(result.message || 'Failed to load tasks', 'error');
            return;
        }

        tasksData = result.data || [];
        const currentUser = getUser();
        const isAdmin = currentUser && currentUser.role === 'admin';
        if (!isAdmin) {
            const currentUserId = Number(currentUser.id);
            tasksData = tasksData.filter(task => Number(task.assigned_to?.id) === currentUserId);
        }
        renderTasks(tasksData, isAdmin);
    }

    function renderTasks(tasks, isAdmin = false) {
        const container = document.getElementById('tasksContainer');
        if (!tasks.length) {
            container.innerHTML = `
                <div style="grid-column: 1/-1;">
                    <div class="empty-state">
                        <div class="empty-state-icon"><i class="fas fa-inbox"></i></div>
                        <h3 class="empty-state-title">No Tasks Yet</h3>
                        <p class="empty-state-text">You don't have any ${currentFilter === 'all' ? '' : currentFilter.replace('_', ' ')} tasks at the moment</p>
                    </div>
                </div>
            `;
            return;
        }

        let html = '';
        tasks.forEach((task, idx) => {
            const statusClass = `status-${task.status}`;
            html += `
                <div class="task-card" style="animation-delay: ${idx * 0.1}s;">
                    <div class="task-card-header">
                        <div class="task-badges">
                            <span class="task-priority-badge priority-${task.priority}">${task.priority}</span>
                            <span class="task-status-badge ${statusClass}">${task.status.replace('_', ' ').toUpperCase()}</span>
                        </div>
                        ${isAdmin ? `<button class="task-menu-btn">
                            <i class="fas fa-ellipsis-v"></i>
                        </button>` : ''}
                    </div>
                    <h3 class="task-card-title">${task.title}</h3>
                    <p class="task-card-description">${task.description || ''}</p>
                    <div class="task-meta-row">
                        <span class="task-meta-label">Assigned by:</span>
                        <span class="task-meta-value">${task.assigned_by?.name || 'Unknown'}</span>
                    </div>
                    <div class="task-meta-row">
                        <span class="task-meta-label">Deadline:</span>
                        <span class="task-meta-value">${task.deadline ? new Date(task.deadline).toLocaleDateString() : 'No deadline'}</span>
                    </div>
                    ${task.status !== 'completed' ? `
                        <div class="task-meta-row">
                            <span class="task-meta-label">Progress:</span>
                            <div style="flex: 1; background: rgba(0,0,0,0.05); border-radius: 8px; height: 6px; overflow: hidden;">
                                <div style="background: linear-gradient(135deg, #000000 0%, #333333 100%); height: 100%; width: ${task.status === 'in_progress' ? 60 : 0}%; transition: width 0.3s ease;"></div>
                            </div>
                        </div>
                    ` : ''}
                    <div class="task-actions">
                        <button class="task-action-btn" onclick="openTaskModal('${task.title}', '${task.description || ''}', '${task.assigned_by?.name || 'Unknown'}', '${task.deadline || ''}', '${task.priority}', '${task.status}')">
                            View Details
                        </button>
                        ${task.status === 'pending' ? `
                            <button class="task-action-btn complete" onclick="beginTask(${task.id})">
                                <i class="fas fa-play"></i> Begin
                            </button>
                        ` : task.status === 'in_progress' ? `
                            <button class="task-action-btn complete" onclick="completeTask(${task.id})">
                                <i class="fas fa-check"></i> Complete
                            </button>
                        ` : ''}
                    </div>
                </div>
            `;
        });

        container.innerHTML = html;
    }

    function openTaskModal(title, description, assignedBy, deadline, priority, status) {
        document.getElementById('taskModalTitle').textContent = title;
        document.getElementById('taskModalBody').innerHTML = `
            <div class="modal-field">
                <div class="modal-label">Description</div>
                <div class="modal-value">${description}</div>
            </div>
            <div class="modal-field">
                <div class="modal-label">Assigned By</div>
                <div class="modal-value">${assignedBy}</div>
            </div>
            <div class="modal-field">
                <div class="modal-label">Deadline</div>
                <div class="modal-value">${deadline ? new Date(deadline).toLocaleDateString() : 'No deadline'}</div>
            </div>
            <div class="modal-field">
                <div class="modal-label">Priority</div>
                <div class="modal-value">${priority.charAt(0).toUpperCase() + priority.slice(1)}</div>
            </div>
            <div class="modal-field">
                <div class="modal-label">Status</div>
                <div class="modal-value">${status.replace('_', ' ').toUpperCase()}</div>
            </div>
        `;
        document.getElementById('taskModal').classList.add('show');
    }

    async function beginTask(taskId) {
        const response = await apiRequest(`/api/tasks/${taskId}/begin`, 'PUT');
        if (!response) return;
        const result = response.data || {};
        if (!response.ok || !result.success) {
            showNotification(result.message || 'Failed to start task', 'error');
            return;
        }
        await loadTasks();
        showNotification('Task started! Status changed to In Progress', 'success');
    }

    async function completeTask(taskId) {
        const response = await apiRequest(`/api/tasks/${taskId}/complete`, 'PUT');
        if (!response) return;
        const result = response.data || {};
        if (!response.ok || !result.success) {
            showNotification(result.message || 'Failed to complete task', 'error');
            return;
        }
        await loadTasks();
        showNotification('Task marked as completed', 'success');
    }

    function showNotification(message, type = 'info') {
        const notification = document.getElementById('notification');
        notification.textContent = message;
        notification.className = `notification ${type} show`;
        setTimeout(() => {
            notification.classList.remove('show');
        }, 4000);
    }

    function closeModal(id) {
        document.getElementById(id).classList.remove('show');
    }

    window.addEventListener('click', (e) => {
        const modal = document.getElementById('taskModal');
        if (e.target === modal) {
            modal.classList.remove('show');
        }
    });

    document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
